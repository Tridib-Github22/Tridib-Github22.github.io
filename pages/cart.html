<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart – Ping TCM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/shop.css" />
  <style>
    /* Augment shop.js-generated cart HTML with our design tokens */
    .cart-lines { display: flex; flex-direction: column; gap: 0; }
    .cart-item { display: grid; grid-template-columns: 70px 1fr auto auto auto; align-items: center; gap: 1rem; padding: 1.1rem 0; border-bottom: 1px solid var(--grey-100); }
    .cart-item__img { width: 70px; height: 70px; border-radius: var(--radius-sm); object-fit: cover; background: var(--green-pale); }
    .cart-item__name { font-weight: 600; font-size: .9rem; margin-bottom: .2rem; }
    .cart-item__unit-price { font-size: .8rem; color: var(--text-light); margin-top: .2rem; }
    .cart-item__qty { display: flex; align-items: center; gap: .4rem; }
    .qty-btn { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--grey-200); background: var(--white); cursor: pointer; font-size: .875rem; display: flex; align-items: center; justify-content: center; transition: all var(--transition); }
    .qty-btn:hover:not(:disabled) { border-color: var(--green-dark); color: var(--green-dark); }
    .qty-btn:disabled { opacity: .4; cursor: not-allowed; }
    .qty-input { width: 44px; text-align: center; border: 1.5px solid var(--grey-200); border-radius: var(--radius-sm); padding: .3rem; font-size: .875rem; }
    .cart-item__line-price { font-weight: 700; color: var(--green-dark); min-width: 70px; text-align: right; }
    .cart-item__remove { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: .25rem; line-height: 1; opacity: .7; transition: opacity var(--transition); }
    .cart-item__remove:hover { opacity: 1; }
    .badge { display: inline-block; padding: .15rem .55rem; border-radius: var(--radius-full); font-size: .68rem; font-weight: 700; text-transform: uppercase; }
    .badge--service { background: var(--green-dark); color: #fff; }
    .badge--product { background: var(--gold); color: #fff; }
    .cart-summary { background: var(--white); border: 1px solid var(--grey-100); border-radius: var(--radius-md); padding: 1.75rem; margin-top: 2rem; max-width: 480px; }
    .coupon-row { display: flex; gap: .5rem; margin-bottom: .5rem; }
    .coupon-input { flex: 1; padding: .6rem .85rem; border: 1.5px solid var(--grey-200); border-radius: var(--radius-sm); font-size: .875rem; font-family: var(--font-body); outline: none; }
    .coupon-input:focus { border-color: var(--green-mid); }
    .coupon-success { font-size: .8rem; color: var(--success); margin-bottom: .5rem; }
    .coupon-error { font-size: .8rem; color: var(--danger); min-height: 1.2em; }
    .cart-totals { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: .9rem; }
    .cart-totals td { padding: .45rem 0; }
    .cart-totals td:last-child { text-align: right; }
    .cart-totals .discount-row td { color: var(--success); }
    .cart-totals .total-row td { font-size: 1.05rem; border-top: 2px solid var(--grey-100); padding-top: .75rem; }
    .cart-actions { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
    .btn--primary { display: inline-flex; align-items: center; gap: .4rem; padding: .75rem 1.5rem; background: var(--gold); color: #fff; border-radius: var(--radius-full); font-weight: 700; font-size: .95rem; border: none; cursor: pointer; transition: all var(--transition); }
    .btn--primary:hover { background: var(--gold-dark); transform: translateY(-2px); }
    .btn--secondary { display: inline-flex; align-items: center; gap: .4rem; padding: .75rem 1.5rem; background: transparent; color: var(--green-dark); border: 2px solid var(--green-dark); border-radius: var(--radius-full); font-weight: 600; font-size: .95rem; cursor: pointer; transition: all var(--transition); }
    .btn--secondary:hover { background: var(--green-dark); color: #fff; }
    .btn--danger { display: inline-flex; align-items: center; gap: .4rem; padding: .75rem 1.5rem; background: transparent; color: var(--danger); border: 1.5px solid var(--danger); border-radius: var(--radius-full); font-weight: 600; font-size: .875rem; cursor: pointer; transition: all var(--transition); }
    .btn--danger:hover { background: var(--danger); color: #fff; }
    .btn--link { background: none; border: none; color: var(--text-light); font-size: .8rem; cursor: pointer; padding: 0 .5rem; }
    .cart-empty { text-align: center; padding: 4rem 2rem; }
    .cart-empty p { font-size: 1.1rem; color: var(--text-light); margin-bottom: 1.5rem; }
    @media(max-width:600px) {
      .cart-item { grid-template-columns: 56px 1fr; gap: .75rem; }
      .cart-item__qty, .cart-item__line-price, .cart-item__remove { grid-column: 2; }
    }
  </style>
</head>
<body>
<div class="notifications-container" id="notifications" aria-live="polite"></div>

<nav class="navbar" id="navbar">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">
      <div class="logo-icon"><i class="fa-solid fa-seedling"></i></div>
      <span>Ping TCM<small>Traditional Chinese Medicine</small></span>
    </a>
    <div class="nav-links" id="navLinks">
      <a href="../index.html">Home</a>
      <a href="treatments.html">Treatments</a>
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="appointments.html">Appointments</a>
      <a href="contact.html">Contact</a>
    </div>
    <div class="nav-actions">
      <a href="cart.html" class="cart-btn" id="cartBtn">
        <i class="fa-solid fa-bag-shopping"></i>
        <span class="cart-badge" id="cartBadge"></span>
      </a>
      <div id="authNav"><a href="login.html" class="btn btn-primary btn-sm">Sign In</a></div>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>

<div class="page-top">
  <div class="page-hero">
    <div class="container">
      <h1>Your Cart</h1>
      <div class="breadcrumb">
        <a href="../index.html">Home</a>
        <i class="fa-solid fa-chevron-right"></i>
        <a href="shop.html">Shop</a>
        <i class="fa-solid fa-chevron-right"></i>
        <span>Cart</span>
      </div>
    </div>
  </div>
</div>

<div class="container" style="padding-top:2.5rem;padding-bottom:3rem;">
  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem;">
    <h2 style="color:var(--green-dark);font-size:1.4rem;">
      Shopping Cart
      <span id="cartCountLabel" style="font-size:.9rem;color:var(--text-light);font-family:var(--font-body);font-weight:400;margin-left:.5rem;"></span>
    </h2>
    <a href="shop.html" style="font-size:.875rem;color:var(--green-mid);display:flex;align-items:center;gap:.35rem;">
      <i class="fa-solid fa-arrow-left"></i> Continue Shopping
    </a>
  </div>

  <!-- shop.js renders into this container -->
  <div id="cart-container">
    <div style="text-align:center;padding:4rem 0;">
      <div class="spinner" style="margin:0 auto 1rem;border-color:var(--grey-200);border-top-color:var(--green-dark);"></div>
      Loading your cart…
    </div>
  </div>
</div>

<footer class="footer" style="margin-top:2rem;">
  <div class="container">
    <div class="footer-bottom" style="padding-top:1.5rem;">
      <p>&copy; 2012–2026 PingTCM.com. All rights reserved.</p>
      <div class="footer-bottom-links">
        <a href="../index.html">Home</a>
        <a href="shop.html">Continue Shopping</a>
      </div>
    </div>
  </div>
</footer>

<script src="../js/app.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/shop.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (window.renderCart) renderCart();
    // Update cart count label
    const items = JSON.parse(localStorage.getItem('ptcm_cart') || '[]');
    const count = items.reduce((s, i) => s + i.qty, 0);
    const label = document.getElementById('cartCountLabel');
    if (label) label.textContent = count > 0 ? `(${count} item${count !== 1 ? 's' : ''})` : '';
  });
</script>
</body>
</html>
